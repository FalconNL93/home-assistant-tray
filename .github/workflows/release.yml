name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  # Fast pre-flight: fail early before spawning expensive build runners.
  check:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2

      - name: install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: setup pnpm
        uses: pnpm/action-setup@v5.0.0

      - name: setup node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: lts/*
          cache: pnpm

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2.9.1
        with:
          workspaces: "./src-tauri -> target"

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: type-check TypeScript
        run: pnpm exec tsc --noEmit

      - name: cargo check
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml

  build:
    needs: check
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Universal binary — one installer for Apple Silicon and Intel Macs.
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "ubuntu-22.04-arm"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: setup pnpm
        uses: pnpm/action-setup@v5.0.0

      - name: setup node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: lts/*
          cache: pnpm

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Both targets required for the universal macOS binary.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2.9.1
        with:
          workspaces: "./src-tauri -> target"

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: build and publish
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          updaterJsonPath: latest.json
          args: ${{ matrix.args }}
