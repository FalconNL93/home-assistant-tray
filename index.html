<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Assistant Tray</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <h1>Home Assistant Tray App</h1>
    <form id="save-form" autocomplete="off">
      <label for="url-input">Home Assistant URL</label>
      <input id="url-input" type="url" placeholder="https://ha.example.com" autocomplete="off" required />
      <label for="token-input">Long-Lived Access Token</label>
      <input id="token-input" type="password" placeholder="Paste your token here" autocomplete="off" />
      <p class="hint">Generate a token in HA → Profile → Security → Long-Lived Access Tokens</p>
      <button type="submit">Save</button>
    </form>
  </body>
</html>
